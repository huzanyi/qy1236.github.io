<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简登录测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <button id="loginBtn">登录</button>
    <div id="testMsg"></div>

    <script>
        // 替换成你的密钥（已填好）
        const SUPABASE_URL = "https://stynvoiwfehsdsouddix.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_vPSpAoQvi50jSn7A1Pq_pwQJ3Kd7";

        // 测试SDK是否加载成功
        try {
            const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            document.getElementById('testMsg').textContent = "SDK加载成功！";
            document.getElementById('testMsg').style.color = "green";
            
            // 绑定按钮事件
            document.getElementById('loginBtn').onclick = function() {
                alert("按钮能点击了！");
            }
        } catch (e) {
            document.getElementById('testMsg').textContent = "报错：" + e.message;
            document.getElementById('testMsg').style.color = "red";
        }
    </script>
</body>
</html>
